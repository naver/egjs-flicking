id: coverflow
category: reactive
demo: reactive/Coverflow

intent: "Reactive API(indexProgress)를 이용한 coverflow 3D 효과를 보여준다"

focus:
  - 5개 패널이 렌더링되고 각각 CSS transform이 적용됨
  - 드래그로 패널 이동 시 transform 값이 동적으로 변경됨
  - circular 모드로 연속 탐색 가능

api:
  options: [circular, align]

frameworks: [vanilla, react, vue]
